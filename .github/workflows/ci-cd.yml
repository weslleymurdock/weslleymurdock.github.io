name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'   # ex: v1.0.0
  pull_request:
    branches: [ main ]
  # only deploy  tags
  release:
    types: [published]  

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ github.workspace }}/Web/Web.csproj

      - name: Build
        run: dotnet build ${{ github.workspace }}/Web/Web.csproj --configuration Release --no-restore

  deploy:
    # só roda se for release ou tag
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish ${{ github.workspace }}/Web/Web.csproj -c Release -o published

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./published/wwwroot
