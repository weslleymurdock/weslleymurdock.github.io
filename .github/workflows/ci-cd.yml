name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'   # ex: v1.0.0
  pull_request:
    branches: [ main ]
  # only deploy  tags
  release:
    types: [published]  

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ github.workspace }}/src/Web/Web.csproj

      - name: Build
        run: dotnet build ${{ github.workspace }}/src/Web/Web.csproj --configuration Release --no-restore

  deploy:
    # only runs if is release or tag
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish ${{ github.workspace }}/src/Web/Web.csproj -c Release -o published
      
      - name: Touch
        working-directory: ${{ github.workspace }}/published/wwwroot
        run: touch .nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot 
          branch: gh-pages 
          clean: true 
